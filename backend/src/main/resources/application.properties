spring.application.name=library-system

# Database Configuration
# Set these as environment variables or in application-local.properties
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/library_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
# Set JWT_SECRET as an environment variable in production
jwt.secret=${JWT_SECRET:94a08da1fecbb6e8b46990538c7b50b2a59e8b15d0b98eb0399d8b1e4f4c8b6b}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Server Port
server.port=8080
